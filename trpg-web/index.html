<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>TRPG 실시간 채팅</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        /* 🚨 [업데이트] body 배경을 solid 검은색(#0f0f0f)에서 이미지로 변경 */
        body {
            font-family: 'Malgun Gothic', sans-serif;
            color: #ffffff;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;

            /* 배경 이미지 설정 영역 */
            background-image: url('background.png'); /* 업로드한 이미지 파일명 */
            background-size: cover; /* 이미지가 화면 전체를 꽉 채우도록 확대/축소 */
            background-position: center; /* 이미지를 중앙에 배치 */
            background-repeat: no-repeat; /* 이미지 반복 안 함 */
            background-attachment: fixed; /* 스크롤해도 배경은 고정됨 (추천) */
        }

        /* 🚨 [업데이트] 로그인 화면의 검은 배경을 투명하게 만들어 body 배경이 보이도록 함 */
        #login-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding: 20px;
            background-color: transparent; /* 투명하게 변경 */
        }

        #login-logo { max-width: 600px; max-height: 300px; margin-bottom: 20px; object-fit: contain; }
        .login-title { color: #ff1493; font-size: 24px; font-weight: bold; margin-bottom: 30px; letter-spacing: 2px; }
        .login-box { width: 100%; margin-bottom: 20px; }
        .login-box label { display: block; font-size: 12px; color: #aaa; margin-bottom: 5px; }
        .login-input { width: 100%; padding: 10px; box-sizing: border-box; background: rgba(34, 34, 34, 0.8); border: 1px solid #ff69b4; color: white; border-radius: 4px; margin-bottom: 10px; }
        .login-btn { width: 100%; padding: 12px; background: #ff69b4; color: black; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .login-btn.gm { background: #444; color: #ff69b4; border: 1px solid #ff69b4; }
        .login-btn:hover { background: #ff1493; color: white; }
        
        #chat-screen { display: none; flex-direction: column; height: 100vh; }
        
        /* 🚨 [업데이트] 헤더 배경을 반투명하게 */
        #chat-header {
            padding: 10px 15px;
            background-color: rgba(0, 0, 0, 0.6); /* 반투명 검은색 */
            border-bottom: 1px solid #333;
            font-weight: bold;
            color: #ff69b4;
            font-size: 14px;
            flex-shrink: 0;
            z-index: 5;
        }

        /* 🚨 [업데이트] 채팅창 영역을 투명하게 해서 배경이미지가 보이도록 함 */
        #chat-container {
            flex-grow: 1;
            padding: 15px 10px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            scroll-behavior: smooth;
            background-color: transparent; /* 투명하게 변경 */
        }
        
        /* 채팅줄 스타일은 유지하되 가독성을 위해 살짝 배경 처리 */
        .chat-line {
            flex-shrink: 0;
            display: flex;
            align-items: flex-start;
            margin-bottom: 6px;
            padding: 4px 8px;
            animation: fadeIn 0.2s ease-in;
            position: relative;
            border-radius: 4px;
            background-color: rgba(0,0,0,0.3); /* 가독성을 위한 아주 옅은 배경 */
        }
        .chat-line:hover { background-color: rgba(255,255,255,0.05); }
        .yt-avatar { width: 24px; height: 24px; border-radius: 50%; background-color: #ff69b4; color: #000; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; margin-right: 12px; flex-shrink: 0; }
        .msg-content { flex-grow: 1; line-height: 1.5; font-size: 13px; }
        .yt-author { color: #aaaaaa; font-weight: bold; margin-right: 8px; }
        .yt-author.gm { color: #ff69b4; background: #333; padding: 2px 4px; border-radius: 4px; font-size: 11px;}
        .yt-text { color: #ffffff; word-break: break-all; }

        /* 🚨 [업데이트] 이모티콘 80x80 강제 고정 및 찌그러짐 방지(object-fit) */
        .chat-emoticon { width: 150px; height: 150px; object-fit: contain; display: block; margin-top: 5px; background: transparent; }

        .sc-container { flex-shrink: 0; border-radius: 4px; margin-bottom: 8px; overflow: hidden; font-size: 13px; width: 100%; animation: fadeIn 0.3s ease-in; position: relative; }
        .sc-header { padding: 8px 12px; display: flex; align-items: center; }
        .sc-info { display: flex; flex-direction: column; }
        .sc-info .yt-author { margin: 0; font-size: 13px; opacity: 0.9; }
        .sc-info .amount { font-weight: bold; font-size: 14px; }
        .sc-body { padding: 8px 12px; font-size: 14px; word-break: break-all;}
        
        .deleted-text { color: #ff0000; font-weight: bold; font-style: italic; text-shadow: 0 0 3px #ff0000; }
        .censor-btn { display: none; background: #ff0000; color: white; border: none; padding: 2px 6px; font-size: 10px; cursor: pointer; border-radius: 3px; position: absolute; right: 10px; top: 10px; }

        /* 🚨 [업데이트] 하단 입력창 영역도 반투명하게 처리 */
        #input-area {
            flex-shrink: 0;
            background-color: rgba(0, 0, 0, 0.7); /* 반투명 검은색 */
            padding: 10px;
            border-top: 1px solid #333;
            display: flex;
            flex-direction: column;
            gap: 8px;
            position: relative;
            z-index: 5;
        }
        
        #emo-panel { display: none; background-color: #1a1a1a; border: 1px solid #ff1493; padding: 10px; border-radius: 8px; position: absolute; bottom: 100%; left: 10px; width: 200px; max-height: 200px; overflow-y: auto; display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-bottom: 10px; z-index: 10;}
        .emo-btn { width: 100%; aspect-ratio: 1; cursor: pointer; border: 1px solid #444; border-radius: 4px; background-color: #222; object-fit: contain; }
        .emo-btn:hover { border-color: #ff69b4; background-color: #333; }

        #sc-panel { display: none; background-color: #1a1a1a; border: 1px solid #ff1493; padding: 10px; border-radius: 8px; flex-direction: column; gap: 8px; margin-bottom: 5px;}
        .sc-title { font-size: 12px; color: #ff69b4; font-weight: bold; }
        .sc-input-group { display: flex; gap: 5px; }
        #scAmount { width: 80px; padding: 8px; background: #000; border: 1px solid #555; color: white; border-radius: 4px; outline: none;}
        #scTextInput { flex-grow: 1; padding: 8px; background: #000; border: 1px solid #555; color: white; border-radius: 4px; outline: none;}
        #scAmount:focus, #scTextInput:focus { border-color: #ff1493; }
        .sc-btns { display: flex; gap: 5px; }
        .sc-btns button { flex: 1; padding: 8px; font-weight: bold; border: none; border-radius: 4px; cursor: pointer; }
        .btn-cancel { background: #444; color: white; }
        .btn-cancel:hover { background: #555; }
        .btn-shoot { background: #ff1493; color: white; }
        .btn-shoot:hover { background: #e0007c; }

        .input-row { display: flex; gap: 5px; align-items: center; }
        #currentNickname { width: 70px; padding: 8px 5px; background: #111; border: 1px solid #ff69b4; color: #ff69b4; border-radius: 4px; font-size: 12px; font-weight: bold; text-align: center; }
        /* 입력란도 투명도 처리 */
        #customInput { flex-grow: 1; padding: 10px; background-color: rgba(34, 34, 34, 0.7); border: 1px solid #555; color: white; border-radius: 20px; font-size: 13px; outline: none; }
        #customInput:focus { border-color: #ff69b4; }
        #customInput:disabled, #scTextInput:disabled, #scAmount:disabled { background-color: #111; cursor: not-allowed; opacity: 0.6; }
        
        .sc-toggle-btn, .emo-toggle-btn { background: transparent; color: #ff69b4; font-weight: bold; font-size: 18px; border: none; cursor: pointer; padding: 0 5px; }
        .send-btn { background: transparent; color: #ff69b4; border: none; font-weight: bold; padding: 0 10px; cursor: pointer; font-size: 14px; }
        .send-btn:disabled, .sc-toggle-btn:disabled, .emo-toggle-btn:disabled { color: #555; cursor: not-allowed; }

        #gm-controls { display: none; gap: 5px; margin-top: 5px; }
        .gm-btn { background: #333; color: white; border: 1px solid #ff69b4; font-size: 11px; padding: 5px; border-radius: 4px; cursor: pointer; flex: 1; }
        .gm-btn:hover { background: #ff1493; }

        #gm-parts { display: none; gap: 5px; margin-top: 5px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <img id="login-logo" src="login_image.png" alt="" onerror="this.style.display='none'">
        <div class="login-title">SYSTEM_CONNECT</div>

        <div class="login-box">
            <label>▶ 플레이어 모드</label>
            <input type="text" id="playerName" class="login-input" placeholder="초기 닉네임 입력">
            <button class="login-btn" onclick="login('player')">채팅 접속</button>
        </div>
        <div style="width:100%; height:1px; background:#333; margin: 10px 0;"></div>
        <div class="login-box">
            <label>▶ 관리자(GM) 모드</label>
            <input type="text" id="gmName" class="login-input" placeholder="GM 닉네임 (예: 시스템, 신)">
            <input type="password" id="gmPassword" class="login-input" placeholder="비밀번호 입력">
            <button class="login-btn gm" onclick="login('gm')">관리자 권한 실행</button>
        </div>
    </div>

    <div id="chat-screen">
        <div id="chat-header">🔴 라이브 스트리밍 중...</div>
        <div id="chat-container"></div>
        <div id="input-area">

            <div id="emo-panel" style="display: none;"></div>

            <div id="sc-panel">
                <div class="sc-title">💎 슈퍼챗 후원하기</div>
                <div class="sc-input-group">
                    <input type="number" id="scAmount" min="1000" max="500000" step="1000" value="5000" title="금액(원)">
                    <input type="text" id="scTextInput" placeholder="여기에 슈퍼챗 메시지를 입력하세요..." onkeypress="handleScKeyPress(event)">
                </div>
                <div class="sc-btns">
                    <button class="btn-cancel" onclick="toggleScPanel()">취소</button>
                    <button class="btn-shoot" onclick="sendSuperchat()">후원 전송</button>
                </div>
            </div>

            <div class="input-row">
                <input type="text" id="currentNickname" title="닉네임 변경">
                <input type="text" id="customInput" placeholder="일반 채팅 메시지..." onkeypress="handleKeyPress(event)">
                <button id="emoToggleBtn" class="emo-toggle-btn" onclick="toggleEmoPanel()" title="이모티콘">☺</button>
                <button id="scToggleBtn" class="sc-toggle-btn" onclick="toggleScPanel()" title="슈퍼챗">₩</button>
                <button id="sendBtn" class="send-btn" onclick="sendNormalMessage()">전송</button>
            </div>

            <div id="gm-parts" class="input-row">
                <button id="btn-Normal" class="gm-btn" style="background-color: #ff1493; color: white;" onclick="changePart('Normal')">Normal</button>
                <button id="btn-HO1" class="gm-btn" onclick="changePart('HO1')">HO1 파트</button>
                <button id="btn-HO2" class="gm-btn" onclick="changePart('HO2')">HO2 파트</button>
                <button id="btn-HO3" class="gm-btn" onclick="changePart('HO3')">HO3 파트</button>
                <button id="btn-HO4" class="gm-btn" onclick="changePart('HO4')">HO4 파트</button>
            </div>

            <div id="gm-controls" class="input-row">
                <button id="toggleAutoBtn" class="gm-btn" onclick="toggleAutoChat()">자동채팅 켜기</button>
                <button id="toggleStreamBtn" class="gm-btn" onclick="toggleStream()" style="background-color: #d32f2f; border-color: #d32f2f;">🔴 방송 끄기</button>
                <button class="gm-btn" onclick="clearChat()" style="background-color: #d32f2f; border-color: #d32f2f;">🔥 초기화</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBzr7u2js7Hkg8JAhSUYYVSWpR88I8YECQ",
            authDomain: "trpg-chat-58d0c.firebaseapp.com",
            databaseURL: "https://trpg-chat-58d0c-default-rtdb.firebaseio.com",
            projectId: "trpg-chat-58d0c",
            storageBucket: "trpg-chat-58d0c.firebasestorage.app",
            messagingSenderId: "793472714544",
            appId: "1:793472714544:web:0392933373c87b3720aaf5",
            measurementId: "G-MHQSLW0S7B"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentUserMode = "";
        let isStreamLive = true;
        const loginTime = Date.now();
        const scAlarmSound = new Audio('alarm.mp3');

        const emoticonList = [
            "emo1.png", "emo2.png", "emo3.png"
        ];

        function initEmoticons() {
            const panel = document.getElementById('emo-panel');
            panel.innerHTML = '';
            emoticonList.forEach(emo => {
                const img = document.createElement('img');
                img.src = emo;
                img.className = 'emo-btn';
                img.onclick = () => sendEmoticon(emo);
                panel.appendChild(img);
            });
        }
        initEmoticons();

        function login(mode) {
            const nicknameInput = document.getElementById('currentNickname');
            if (mode === 'player') {
                const name = document.getElementById('playerName').value.trim();
                if (!name) return alert('닉네임을 입력해주세요!');
                nicknameInput.value = name;
                currentUserMode = 'player';
            } else if (mode === 'gm') {
                const pw = document.getElementById('gmPassword').value;
                const name = document.getElementById('gmName').value.trim() || 'GM_MASTER';
                if (pw !== "1234") return alert('비밀번호가 틀렸습니다.');
                nicknameInput.value = name;
                currentUserMode = 'gm';
                document.getElementById('gm-controls').style.display = 'flex';
                document.getElementById('gm-parts').style.display = 'flex';
            }
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('chat-screen').style.display = 'flex';
        }

        db.ref('settings/isLive').on('value', (snapshot) => {
            isStreamLive = snapshot.val();
            if (isStreamLive === null) isStreamLive = true;

            const header = document.getElementById('chat-header');
            const inputs = ['customInput', 'scTextInput', 'scAmount'];
            const btns = ['sendBtn', 'scToggleBtn', 'emoToggleBtn'];
            const shootBtn = document.querySelector('.btn-shoot');
            const streamBtn = document.getElementById('toggleStreamBtn');

            if (isStreamLive) {
                header.innerHTML = '🔴 라이브 스트리밍 중...';
                header.style.color = '#ff69b4';
                if (streamBtn) { streamBtn.innerText = '🔴 방송 끄기'; streamBtn.style.backgroundColor = '#d32f2f'; streamBtn.style.borderColor = '#d32f2f'; }

                inputs.forEach(id => { if (document.getElementById(id)) document.getElementById(id).disabled = false; });
                btns.forEach(id => { if (document.getElementById(id)) document.getElementById(id).disabled = false; });
                if (shootBtn) shootBtn.disabled = false;
                document.getElementById('customInput').placeholder = "일반 채팅 메시지...";
            } else {
                header.innerHTML = '⚫ 방송이 종료되었습니다.';
                header.style.color = '#aaaaaa';
                if (streamBtn) { streamBtn.innerText = '🟢 방송 켜기'; streamBtn.style.backgroundColor = '#4CAF50'; streamBtn.style.borderColor = '#4CAF50'; }

                inputs.forEach(id => { if (document.getElementById(id)) document.getElementById(id).disabled = true; });
                btns.forEach(id => { if (document.getElementById(id)) document.getElementById(id).disabled = true; });
                if (shootBtn) shootBtn.disabled = true;
                document.getElementById('customInput').placeholder = "방송이 종료되어 채팅을 칠 수 없습니다.";
            }
        });

        function toggleStream() {
            db.ref('settings/isLive').once('value').then((snapshot) => {
                let currentLive = snapshot.val();
                if (currentLive === null) currentLive = true;
                db.ref('settings').update({ isLive: !currentLive });
            });
        }

        db.ref('messages').on('value', (snapshot) => {
            if (!snapshot.exists()) document.getElementById('chat-container').innerHTML = '';
        });

        db.ref('messages').once('value').then(() => {
            setTimeout(() => {
                const chatContainer = document.getElementById('chat-container');
                if (chatContainer) {
                    chatContainer.style.scrollBehavior = 'auto';
                    chatContainer.scrollTop = chatContainer.scrollHeight;
                    requestAnimationFrame(() => {
                        chatContainer.scrollTop = chatContainer.scrollHeight;
                        chatContainer.style.scrollBehavior = 'smooth';
                    });
                }
            }, 800);
        });

        db.ref('messages').on('child_added', (snapshot) => {
            const data = snapshot.val();
            if (!data || typeof data.text === "undefined" || data.text.trim() === "") return;

            if (data.isSuperchat && data.amount >= 50000 && data.timestamp > loginTime) {
                scAlarmSound.play().catch(e => console.log("알람 재생 에러:", e));
            }

            displayMessage(snapshot.key, data.username || "익명", data.text, data.isSuperchat || false, data.amount || 0, data.censored || false);
        });

        db.ref('messages').on('child_changed', (snapshot) => {
            if (snapshot.val().censored) triggerGlitchEffect(snapshot.key);
        });

        function getSuperchatColor(amount) {
            if (amount < 5000) return { header: '#1565C0', body: '#1E88E5', text: '#ffffff' };
            if (amount < 10000) return { header: '#00897B', body: '#00BFA5', text: '#000000' };
            if (amount < 20000) return { header: '#F57F17', body: '#FFEB3B', text: '#000000' };
            if (amount < 50000) return { header: '#E65100', body: '#FF9800', text: '#ffffff' };
            if (amount < 100000) return { header: '#C2185B', body: '#E91E63', text: '#ffffff' };
            return { header: '#B71C1C', body: '#E53935', text: '#ffffff' };
        }

        function displayMessage(id, username, text, isSuperchat, amount, isCensored) {
            try {
                const chatContainer = document.getElementById('chat-container');
                const lineDiv = document.createElement('div');
                const initial = username.charAt(0).toUpperCase();
                const safeAmount = parseInt(amount) || 0;

                let parsedText = text;
                if (!isCensored && text.startsWith("[EMOJI:") && text.endsWith("]")) {
                    const emoFile = text.substring(7, text.length - 1);
                    parsedText = `<img src="${emoFile}" class="chat-emoticon" onerror="this.src=''" alt="이모티콘">`;
                } else if (isCensored) {
                    parsedText = '<span class="deleted-text">[시스템에 의해 삭제된 데이터입니다]</span>';
                }

                if (isSuperchat) {
                    const colors = getSuperchatColor(safeAmount);
                    lineDiv.className = 'sc-container';
                    lineDiv.innerHTML = `
                            <div class="sc-header" style="background-color: ${colors.header};">
                                <div class="yt-avatar" style="background-color: #fff;">${initial}</div>
                                <div class="sc-info">
                                    <div class="yt-author" style="color: ${colors.text};">${username}</div>
                                    <div class="amount" style="color: ${colors.text};">₩${safeAmount.toLocaleString()}</div>
                                </div>
                            </div>
                            <div class="sc-body" style="background-color: ${colors.body}; color: ${colors.text};">
                                <span id="text-${id}">${parsedText}</span>
                            </div>
                        `;
                } else {
                    lineDiv.className = 'chat-line';
                    lineDiv.innerHTML = `
                            <div class="yt-avatar">${initial}</div>
                            <div class="msg-content">
                                <span class="yt-author ${username.includes('GM') ? 'gm' : ''}">${username}</span>
                                <span class="yt-text" id="text-${id}">${parsedText}</span>
                            </div>
                        `;
                }

                if (currentUserMode === 'gm' && !isCensored) {
                    const censorBtn = document.createElement('button');
                    censorBtn.className = 'censor-btn';
                    censorBtn.innerText = '검열';
                    censorBtn.style.display = 'block';
                    censorBtn.onclick = () => {
                        db.ref('messages/' + id).update({ censored: true });
                        censorBtn.remove();
                    };
                    lineDiv.appendChild(censorBtn);
                }

                chatContainer.appendChild(lineDiv);
                chatContainer.scrollTop = chatContainer.scrollHeight;
            } catch (error) { console.error("메시지 출력 에러:", error); }
        }

        function toggleEmoPanel() {
            if (!isStreamLive) return alert("현재 방송이 종료되었습니다.");
            const emoPanel = document.getElementById('emo-panel');
            const scPanel = document.getElementById('sc-panel');
            scPanel.style.display = 'none';
            emoPanel.style.display = emoPanel.style.display === 'grid' ? 'none' : 'grid';
        }

        function toggleScPanel() {
            if (!isStreamLive) return alert("현재 방송이 종료되었습니다.");
            const emoPanel = document.getElementById('emo-panel');
            const scPanel = document.getElementById('sc-panel');
            emoPanel.style.display = 'none';
            scPanel.style.display = scPanel.style.display === 'flex' ? 'none' : 'flex';
            if (scPanel.style.display === 'flex') document.getElementById('scTextInput').focus();
        }

        function sendEmoticon(emoFileName) {
            if (!isStreamLive) return;
            let username = document.getElementById('currentNickname').value.trim() || "익명";

            db.ref('messages').push({
                username: username, text: `[EMOJI:${emoFileName}]`, isSuperchat: false,
                amount: 0, censored: false, timestamp: firebase.database.ServerValue.TIMESTAMP
            });
            document.getElementById('emo-panel').style.display = 'none';
        }

        function sendNormalMessage() {
            try {
                if (!isStreamLive) return alert("현재 방송이 종료되었습니다.");
                let text = document.getElementById('customInput').value.trim();
                let username = document.getElementById('currentNickname').value.trim() || "익명";

                if (!text) return;
                document.getElementById('customInput').value = '';

                db.ref('messages').push({
                    username: username, text: text, isSuperchat: false,
                    amount: 0, censored: false, timestamp: firebase.database.ServerValue.TIMESTAMP
                });
            } catch (error) { console.error("일반 채팅 에러:", error); }
        }

        function sendSuperchat() {
            try {
                if (!isStreamLive) return alert("현재 방송이 종료되었습니다.");

                let text = document.getElementById('scTextInput').value.trim();
                let username = document.getElementById('currentNickname').value.trim() || "익명";
                let amount = parseInt(document.getElementById('scAmount').value) || 5000;

                if (!text) return alert("슈퍼챗 메시지를 입력해주세요!");

                document.getElementById('scTextInput').value = '';
                document.getElementById('sc-panel').style.display = 'none';

                db.ref('messages').push({
                    username: username, text: text, isSuperchat: true,
                    amount: amount, censored: false, timestamp: firebase.database.ServerValue.TIMESTAMP
                });
            } catch (error) { console.error("슈퍼챗 에러:", error); }
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter' && !document.getElementById('sendBtn').disabled) sendNormalMessage();
        }
        function handleScKeyPress(event) {
            if (event.key === 'Enter' && !document.querySelector('.btn-shoot').disabled) sendSuperchat();
        }

        function clearChat() {
            if (confirm("경고: 모든 채팅 기록을 완전히 삭제하시겠습니까?")) db.ref('messages').remove();
        }

        function triggerGlitchEffect(id) {
            const textSpan = document.getElementById(`text-${id}`);
            if (!textSpan) return;
            const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()_+";
            let duration = 1500; let start = Date.now();
            let timer = setInterval(() => {
                if (Date.now() - start > duration) {
                    clearInterval(timer);
                    textSpan.innerHTML = '<span class="deleted-text">[시스템에 의해 삭제된 데이터입니다]</span>';
                } else {
                    let randomStr = "";
                    for (let i = 0; i < 10; i++) randomStr += chars[Math.floor(Math.random() * chars.length)];
                    textSpan.innerText = randomStr;
                }
            }, 50);
        }

        /* =========================================
           🚨 [업데이트] Normal + HO 시트 혼합 시스템
           ========================================= */
        let currentPart = 'Normal'; // 처음에는 Normal이 기본값
        let excelChatList = [];
        let autoChatInterval;
        let isAutoChatOn = false;

        // 파트 변경 버튼을 눌렀을 때 실행되는 함수
        async function changePart(part) {
            currentPart = part;

            // 버튼 색상 업데이트 (선택된 파트는 핑크색)
            ['Normal', 'HO1', 'HO2', 'HO3', 'HO4'].forEach(p => {
                const btn = document.getElementById(`btn-${p}`);
                if (btn) {
                    btn.style.backgroundColor = (p === part) ? '#ff1493' : '#333';
                    btn.style.color = '#fff';
                }
            });

            // 자동채팅이 켜져있으면 즉시 바뀐 시트로 데이터 로드
            if (isAutoChatOn) {
                await loadExcelAutoChat(currentPart);
            }
        }

        // 엑셀 파일(autochat.xlsx)에서 Normal과 선택된 HO 데이터를 섞어서 가져옵니다.
        async function loadExcelAutoChat(selectedPart) {
            try {
                const response = await fetch('autochat.xlsx');
                if (!response.ok) throw new Error("엑셀 파일 없음");

                const arrayBuffer = await response.arrayBuffer();
                const workbook = XLSX.read(arrayBuffer, { type: 'array' });

                excelChatList = []; // 배열 초기화

                // 1️⃣ 무조건 'Normal' 시트의 데이터를 읽어서 담습니다.
                const normalSheet = workbook.Sheets['Normal'];
                if (normalSheet) {
                    const rows = XLSX.utils.sheet_to_json(normalSheet, { header: 1 });
                    for (let i = 1; i < rows.length; i++) { // 1번째 줄(헤더) 건너뛰고 2번째 줄부터
                        const row = rows[i];
                        if (row && row.length >= 2 && row[0] && row[1]) {
                            excelChatList.push({ u: row[0].toString().trim(), t: row[1].toString().trim() });
                        }
                    }
                }

                // 2️⃣ 선택된 파트가 'Normal'이 아니라면(HO 버튼을 눌렀다면), 해당 HO 시트도 읽어서 추가합니다.
                if (selectedPart !== 'Normal') {
                    const partSheet = workbook.Sheets[selectedPart];
                    if (partSheet) {
                        const rows = XLSX.utils.sheet_to_json(partSheet, { header: 1 });
                        for (let i = 1; i < rows.length; i++) {
                            const row = rows[i];
                            if (row && row.length >= 2 && row[0] && row[1]) {
                                excelChatList.push({ u: row[0].toString().trim(), t: row[1].toString().trim() });
                            }
                        }
                    } else {
                        console.log(`${selectedPart} 시트를 찾을 수 없습니다.`);
                    }
                }

                if (excelChatList.length === 0) console.log(`데이터가 없습니다.`);
            } catch (error) {
                console.log("autochat.xlsx 파일이 없습니다.", error);
                excelChatList = [{ u: "시스템", t: "autochat.xlsx 파일이나 시트를 찾을 수 없습니다." }];
            }
        }

        function sendAutoChatFromExcel() {
            if (!isStreamLive || excelChatList.length === 0) return;
            // 합쳐진 전체 리스트(Normal + HO)에서 무작위로 하나 뽑아서 전송
            const randomPick = excelChatList[Math.floor(Math.random() * excelChatList.length)];

            db.ref('messages').push({
                username: randomPick.u, text: randomPick.t, isSuperchat: false,
                amount: 0, censored: false, timestamp: firebase.database.ServerValue.TIMESTAMP
            });
        }

        async function toggleAutoChat() {
            const btn = document.getElementById('toggleAutoBtn');
            isAutoChatOn = !isAutoChatOn;

            if (isAutoChatOn) {
                btn.textContent = "자동채팅 끄기"; btn.style.backgroundColor = "#ff0000";
                // 자동채팅을 켤 때마다 최신 설정으로 엑셀 데이터를 로드합니다.
                await loadExcelAutoChat(currentPart);
                autoChatInterval = setInterval(sendAutoChatFromExcel, Math.random() * 2000 + 3000);
            } else {
                btn.textContent = "자동채팅 켜기"; btn.style.backgroundColor = "#333";
                clearInterval(autoChatInterval);
            }
        }
    </script>
</body>
</html>
