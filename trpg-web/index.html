<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>스트리밍 채팅창</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #000000; /* 블랙 배경 */
            color: #ffffff;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        #chat-container {
            flex-grow: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        /* 메시지와 검열 버튼을 나란히 두기 위한 래퍼 */
        .message-wrapper {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 10px;
            animation: fadeIn 0.3s ease-in-out;
        }
        .message {
            flex-grow: 1;
            line-height: 1.5;
            border-left: 3px solid #ff1493; /* 핑크색 포인트 라인 */
            padding-left: 10px;
            word-break: break-all;
        }
        .username {
            font-weight: bold;
            color: #ff69b4; /* 핫핑크 닉네임 */
            margin-right: 5px;
        }
        /* 슈퍼챗 핑크 스타일 */
        .superchat {
            background-color: #ff1493;
            color: #ffffff;
            padding: 10px 15px;
            border-radius: 8px;
            font-weight: bold;
            border-left: none;
            box-shadow: 0 0 10px rgba(255, 20, 147, 0.5); /* 핑크빛 네온 효과 */
        }
        .superchat .username { color: #000000; background: #fff; padding: 2px 6px; border-radius: 4px;}
        .superchat .amount { color: #ffe4e1; margin-right: 5px; margin-left: 5px;}
        
        /* 삭제된 텍스트 스타일 (검열 후) */
        .deleted-text {
            color: #ff0000;
            font-weight: bold;
            text-shadow: 0 0 5px #ff0000;
            font-style: italic;
        }

        /* GM 전용 검열 버튼 (기본 숨김) */
        .censor-btn {
            display: none;
            background-color: #ff0000;
            color: white;
            border: none;
            padding: 4px 8px;
            font-size: 11px;
            cursor: pointer;
            margin-left: 10px;
            border-radius: 3px;
            flex-shrink: 0;
            font-weight: bold;
        }
        .censor-btn:hover { background-color: #cc0000; }

        /* GM 패널 (기본은 숨김) */
        #controls {
            display: none; 
            background-color: #111111;
            padding: 10px;
            border-top: 1px solid #ff69b4;
            flex-direction: column;
            gap: 10px;
        }
        .control-row { display: flex; gap: 5px; }
        input[type="text"] {
            flex-grow: 1;
            padding: 8px;
            background-color: #222;
            border: 1px solid #ff69b4;
            color: white;
            border-radius: 4px;
        }
        button {
            padding: 8px 12px;
            background-color: #ff69b4;
            color: black;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background-color: #ff1493; color: white; }
        .superchat-btn { background-color: #fff; border: 2px solid #ff1493; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }
    </style>
</head>
<body>

    <div id="chat-container"></div>

    <div id="controls">
        <div class="control-row">
            <input type="text" id="customInput" placeholder="GM 직접 입력 (엔터 전송)" onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage(false)">일반</button>
            <button class="superchat-btn" onclick="sendMessage(true)">슈퍼챗</button>
        </div>
        <div class="control-row">
            <button id="toggleAutoBtn" onclick="toggleAutoChat()">자동 채팅 켜기</button>
        </div>
    </div>

    <script>
        // 매그파이님의 파이어베이스 설정값 적용 완료!
        const firebaseConfig = {
            apiKey: "AIzaSyBzr7u2js7Hkg8JAhSUYYVSWpR88I8YECQ",
            authDomain: "프로젝트명.firebaseapp.com",
            databaseURL: "https://trpg-chat-58d0c.firebaseio.com", // ★주의: URL 형식을 맞췄습니다.
            projectId: "trpg-chat-58d0c",
            storageBucket: "trpg-chat-58d0c.firebasestorage.app",
            messagingSenderId: "793472714544",
            appId: "1:793472714544:web:0392933373c87b3720aaf5",
            measurementId: "G-MHQSLW0S7B"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const chatContainer = document.getElementById('chat-container');
        const customInput = document.getElementById('customInput');
        const controls = document.getElementById('controls');
        
        // URL 확인해서 GM 모드 켜기 (?gm=true)
        let isGmMode = false;
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('gm') === 'true') {
            isGmMode = true;
            controls.style.display = 'flex';
        }

        // 메시지 추가 감지
        db.ref('messages').on('child_added', (snapshot) => {
            const data = snapshot.val();
            const messageId = snapshot.key;
            displayMessage(messageId, data.username, data.text, data.isSuperchat, data.amount, data.censored);
        });

        // 메시지 변경(검열) 감지
        db.ref('messages').on('child_changed', (snapshot) => {
            const data = snapshot.val();
            const messageId = snapshot.key;
            if (data.censored) {
                triggerGlitchEffect(messageId);
            }
        });

        // 화면에 메시지 그리기
        function displayMessage(id, username, text, isSuperchat, amount = 0, isCensored = false) {
            const wrapperDiv = document.createElement('div');
            wrapperDiv.className = 'message-wrapper';
            wrapperDiv.id = `wrapper-${id}`;

            const msgDiv = document.createElement('div');
            msgDiv.className = isSuperchat ? 'message superchat' : 'message';
            msgDiv.id = `msg-${id}`;

            let contentHtml = '';
            if (isSuperchat) {
                contentHtml = `<span class="username">${username}</span><span class="amount">₩${amount.toLocaleString()}</span><br>`;
            } else {
                contentHtml = `<span class="username">${username}:</span> `;
            }

            const textSpan = document.createElement('span');
            textSpan.id = `text-${id}`;
            
            if (isCensored) {
                textSpan.className = 'deleted-text';
                textSpan.innerText = '[시스템에 의해 삭제된 데이터입니다]';
            } else {
                textSpan.innerText = text;
            }

            msgDiv.innerHTML = contentHtml;
            msgDiv.appendChild(textSpan);
            wrapperDiv.appendChild(msgDiv);

            // GM 모드일 때만 검열 버튼 추가
            if (isGmMode && !isCensored) {
                const censorBtn = document.createElement('button');
                censorBtn.className = 'censor-btn';
                censorBtn.innerText = '검열';
                censorBtn.style.display = 'block';
                censorBtn.onclick = () => censorMessage(id);
                wrapperDiv.appendChild(censorBtn);
            }

            chatContainer.appendChild(wrapperDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // 서버에 검열 상태 업데이트
        function censorMessage(id) {
            db.ref('messages/' + id).update({ censored: true });
            const btn = document.querySelector(`#wrapper-${id} .censor-btn`);
            if(btn) btn.style.display = 'none';
        }

        // 글리치 애니메이션 연출
        function triggerGlitchEffect(id) {
            const textSpan = document.getElementById(`text-${id}`);
            if (!textSpan) return;

            const glitchChars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()_+<>{}[]|\\~`";
            let duration = 1500; // 1.5초
            let start = Date.now();
            let originalLength = textSpan.innerText.length > 10 ? textSpan.innerText.length : 10;

            let timer = setInterval(() => {
                let now = Date.now();
                if (now - start > duration) {
                    clearInterval(timer);
                    textSpan.className = 'deleted-text';
                    textSpan.innerText = '[시스템에 의해 삭제된 데이터입니다]';
                } else {
                    let randomStr = "";
                    for(let i = 0; i < originalLength; i++) {
                        randomStr += glitchChars[Math.floor(Math.random() * glitchChars.length)];
                    }
                    textSpan.innerText = randomStr;
                }
            }, 50);
        }

        // 메시지 전송 로직
        function sendMessage(isSuperchat, isAuto = false) {
            let text = "";
            let username = "";
            let amount = 0;

            if (isAuto) {
                const viewers = ["사이버펑크팬", "익명유저", "핑크블랙", "네온사인"];
                const messages = ["오 분위기 좋은데?", "ㅋㅋ 대박", "주사위 운 무엇", "긴장감 미쳤다"];
                username = viewers[Math.floor(Math.random() * viewers.length)];
                text = messages[Math.floor(Math.random() * messages.length)];
            } else {
                text = customInput.value.trim();
                if (!text) return;
                username = "시스템/후원자";
                customInput.value = '';
                if (isSuperchat) amount = Math.floor(Math.random() * 5 + 1) * 10000;
            }

            db.ref('messages').push({
                username: username,
                text: text,
                isSuperchat: isSuperchat,
                amount: amount,
                censored: false,
                timestamp: firebase.database.ServerValue.TIMESTAMP
            });
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') sendMessage(false);
        }

        // 자동 채팅 타이머
        let autoChatInterval;
        let isAutoChatOn = false;
        const toggleAutoBtn = document.getElementById('toggleAutoBtn');

        function toggleAutoChat() {
            isAutoChatOn = !isAutoChatOn;
            if (isAutoChatOn) {
                toggleAutoBtn.textContent = "자동 채팅 끄기";
                toggleAutoBtn.style.backgroundColor = "#555";
                autoChatInterval = setInterval(() => sendMessage(false, true), Math.random() * 2000 + 3000); 
            } else {
                toggleAutoBtn.textContent = "자동 채팅 켜기";
                toggleAutoBtn.style.backgroundColor = "#ff69b4";
                clearInterval(autoChatInterval);
            }
        }
    </script>
</body>
</html>
